name: cd

on:
    push:
      branches: [main]  

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest

        env:
            DATABASE_URL: ${{ secrets.DATABASE_URL }}

        permissions:
          contents: read
          id-token: write

        steps:
          - name: Check out code
            uses: actions/checkout@v4

          - name: Set up Go
            uses: actions/setup-go@v5
            with:
              go-version: "1.26.0"

          - name: install goose db migration tool
            run: go install github.com/pressly/goose/v3/cmd/goose@latest

          - name: Deploy
            run: scripts/buildprod.sh

          - id: auth
            uses: google-github-actions/auth@v2
            with:
                workload_identity_provider: 'projects/842724092024/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
                service_account: 'github-cd-deployer@notely-492501.iam.gserviceaccount.com'
        
          - name : Setup Cloud SDK
            uses: google-github-actions/setup-gcloud@v2
            
          - name: Use cloud CLI
            run: gcloud info
        
          - name: Build and push Docker image
            run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-492501/notely-ar-repo/notely:latest .

          - name: migrate the database
            run: ./scripts/migrateup.sh
          
          - name: Deploy to Cloud Run
            run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-492501/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-492501 --max-instances 4 --min-instances 0  